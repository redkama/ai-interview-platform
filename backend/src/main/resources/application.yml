spring:
  application:
    name: backend
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  error:
    include-message: always

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret-key: ${JWT_SECRET:${JWT_SECRET_KEY:}}
  access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION:${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}}
  refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION:${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}}

integration:
  ai:
    provider: ${AI_PROVIDER:stub-ai}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_SERVICE_URL:${AI_BASE_URL:}}
    model: ${AI_MODEL:}
  speech:
    provider: ${SPEECH_PROVIDER:stub-speech}
    api-key: ${SPEECH_API_KEY:}
    base-url: ${SPEECH_BASE_URL:}
    voice: ${SPEECH_VOICE:}
